# Copy this file to a local private config or set equivalent environment variables.
# Do NOT commit real secrets.

# =====================================================
# Application Config
# =====================================================
spring.application.name=music-review-backend
server.port=8080

# =====================================================
# Database Config (via env)
# =====================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/music_review?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:your_db_username}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_db_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# JPA / Hibernate Config
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =====================================================
# JWT Config
# =====================================================
# Must be set in production; app fails fast when empty.
jwt.secret=${JWT_SECRET:replace_with_a_secure_base64_secret}
jwt.expiration=86400000

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,https://guessband.cn,https://www.guessband.cn
app.auth.cookie-secure=true
app.auth.login.max-attempts=8
app.auth.login.window-seconds=300
app.auth.login.lock-seconds=900
app.auth.login.redis.enabled=true
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.timeout=2s

# =====================================================
# File Upload Config
# =====================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=/opt/music-review/uploads
