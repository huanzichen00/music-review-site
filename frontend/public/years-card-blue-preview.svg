      <rect width="250" height="300" rx="14" fill="url(#card)" stroke="#9FBCE6" stroke-width="2"/>
      <text x="20" y="42" font-size="30" fill="#224A86" font-family="'Noto Sans SC',sans-serif" font-weight="700">2024</text>
      <rect x="20" y="58" width="210" height="158" rx="10" fill="url(#cover)"/>
      <rect x="20" y="230" width="104" height="30" rx="15" fill="#4E8DE6"/>
      <text x="36" y="250" font-size="16" fill="#F5FAFF" font-family="'Noto Sans SC',sans-serif">18 张专辑</text>
      <rect x="132" y="230" width="98" height="30" rx="15" fill="#2F6FC8"/>
      <text x="144" y="250" font-size="16" fill="#F5FAFF" font-family="'Noto Sans SC',sans-serif">3 支乐队</text>
    </g>

