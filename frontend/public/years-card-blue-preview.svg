<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-label="年份卡片蓝色系预览">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#EAF2FF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F1F7FF"/>
      <stop offset="100%" stop-color="#DDEBFF"/>
    </linearGradient>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D1E4FF"/>
      <stop offset="100%" stop-color="#ABC8F5"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="860" fill="url(#bg)"/>
  <text x="120" y="110" font-size="56" fill="#1F3D77" font-family="'Playfair Display','Noto Serif SC',serif" font-weight="700">🗓 浏览年份</text>

  <g transform="translate(120,170)">
